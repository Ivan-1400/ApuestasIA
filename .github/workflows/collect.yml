name: Recolección diaria de predicciones

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC todos los días
  workflow_dispatch: {} # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Recolectar predicciones y resultados
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/collect_daily.py

      - name: Guardar la base actualizada en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/apuestas.sqlite
          git diff --staged --quiet || git commit -m "Recolección automática $(date -u +%Y-%m-%d)"
          git push
