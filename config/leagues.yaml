# Config de ligas/competencias a seguir.
#
# Dos fuentes de fútbol, elegidas por liga vía "source":
#   - football_data: football-data.org (oficial). Cubre las 5 ligas top de Europa.
#     Se usó en vez de API-Football porque el tier gratis de API-Football no da acceso a la
#     temporada actual en ninguna liga (solo histórico 2022-2024) — confirmado 2026-07-19.
#   - espn: API interna (NO oficial) que usa espn.com para sus propias páginas. Sin key, sin
#     garantía de estabilidad. Se usa solo para Liga MX y MLS porque ninguna fuente oficial
#     gratis las cubre con temporada actual. Si deja de funcionar, esas dos ligas vuelven a
#     mostrar "sin datos" sin afectar al resto — ver src/data/espn_client.py.

season: 2026  # temporada a consultar (ajustar según corresponda)

soccer:
  enabled: true
  leagues:
    - code: PL
      name: "Premier League"
      country: "England"
      source: football_data
    - code: PD
      name: "La Liga"
      country: "Spain"
      source: football_data
    - code: SA
      name: "Serie A"
      country: "Italy"
      source: football_data
    - code: BL1
      name: "Bundesliga"
      country: "Germany"
      source: football_data
    - code: CL
      name: "UEFA Champions League"
      country: "World"
      source: football_data
    - code: mex.1
      name: "Liga MX"
      country: "Mexico"
      source: espn
    - code: usa.1
      name: "Major League Soccer"
      country: "USA"
      source: espn

mlb:
  enabled: true
  # MLB Stats API no usa "league id" como API-Football; se consulta por fecha directamente.
